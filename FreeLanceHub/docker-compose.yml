version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: freelancehub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: freelancehub
      POSTGRES_USER: flhub_user
      POSTGRES_PASSWORD: flhub_password_2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: freelancehub_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@freelancehub.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
